name: Deploy to VPS (veteran.aitomate.cloud)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Rsync Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh

          # Write key with correct name
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/veteran_deploy_new
          chmod 600 ~/.ssh/veteran_deploy_new

          # Add VPS to known_hosts
          ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy using rsync
        run: |
          echo "🚀 Starting deployment..."

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/veteran_deploy_new -o StrictHostKeyChecking=accept-new" \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET_DIR }}/

          echo "✅ Deployment completed successfully"