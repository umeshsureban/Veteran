name: Deploy to Hostinger VPS (veteran.aitomate.cloud)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: SFTP Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SFTP to Hostinger VPS
        uses: appleboy/scp-action@master
        with:
          host: 72.60.103.200
          port: 22
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          source: "index.html,brand_assets/"
          target: ${{ secrets.SFTP_TARGET_DIR }}
          strip_components: 0
          overwrite: true
