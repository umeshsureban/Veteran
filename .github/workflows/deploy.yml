name: Deploy to VPS (veteran.aitomate.cloud)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: SSH Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Create target directory if it doesn't exist
            mkdir -p ${{ secrets.SSH_TARGET_DIR }}
            # Change to target directory and prepare for sync
            cd ${{ secrets.SSH_TARGET_DIR }}

      - name: Sync files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "index.html,brand_assets/"
          target: ${{ secrets.SSH_TARGET_DIR }}
          strip_components: 0
          overwrite: true
